<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFDP Tour — Vote Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #header {
      background: #1a0000;
      border-bottom: 2px solid #cc2200;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header h1 { font-size: 1.2rem; font-weight: 700; color: #ff4422; letter-spacing: 2px; text-transform: uppercase; }
    #subtitle { font-size: 0.75rem; color: #888; margin-top: 2px; }
    #total-votes { background: #cc2200; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }

    #tab-bar {
      background: #120000;
      border-bottom: 1px solid #2a0000;
      display: flex;
      flex-shrink: 0;
    }
    .tab {
      padding: 9px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #666;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-transform: uppercase;
    }
    .tab:hover { color: #cc5540; }
    .tab.active { color: #ff4422; border-bottom-color: #cc2200; }

    #main { display: flex; flex: 1; overflow: hidden; position: relative; }
    .tour-pane { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 300px;
      background: #111;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 10px 14px;
      background: #1a0000;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.75rem;
      color: #ff4422;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .concert-item { padding: 8px 12px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; }
    .concert-item:hover { background: #191919; }
    .concert-item.gold   { background: #1a1000; }
    .concert-item.silver { background: #141414; }
    .concert-item.bronze { background: #120a00; }

    .vote-bar-wrap { flex: 1; min-width: 0; }
    .concert-name  { font-size: 0.74rem; font-weight: 600; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .concert-date  { font-size: 0.64rem; color: #555; margin-top: 1px; }
    .vote-bar      { height: 3px; background: #222; border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .vote-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .vote-count    { font-size: 0.95rem; font-weight: 700; min-width: 28px; text-align: right; flex-shrink: 0; }

    .map-container { flex: 1; }

    #legend {
      position: absolute;
      bottom: 28px;
      right: 10px;
      background: rgba(10,10,10,0.9);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 14px;
      z-index: 1000;
      font-size: 0.72rem;
      pointer-events: none;
    }
    #legend .legend-title { color: #ff4422; font-weight: 700; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px; }
    .legend-gradient {
      width: 160px; height: 10px;
      background: linear-gradient(to right, #0033cc, #0066ee, #0099ff, #00bbee, #00ccaa, #00cc77, #00bb44, #66cc00, #aadd00, #ffcc00, #ff8800, #ff2200);
      border-radius: 2px; margin-bottom: 4px;
    }
    .legend-labels { display: flex; justify-content: space-between; color: #666; }

    .leaflet-popup-content-wrapper { background: #111 !important; border: 1px solid #cc2200 !important; color: #eee !important; border-radius: 6px !important; box-shadow: 0 4px 20px rgba(200,30,0,0.3) !important; }
    .leaflet-popup-tip { background: #111 !important; }
    .popup-date   { font-size: 0.68rem; color: #ff4422; text-transform: uppercase; letter-spacing: 1px; }
    .popup-venue  { font-weight: 700; font-size: 0.95rem; margin: 3px 0 2px; }
    .popup-city   { color: #888; font-size: 0.8rem; }
    .popup-votes  { margin-top: 8px; font-size: 1.1rem; font-weight: 700; color: #ff6644; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>&#x1F480; FFDP Tour — Vote Heatmap</h1>
    <div id="subtitle">20th Anniversary World Tour &middot; North America &middot; 45 shows</div>
  </div>
  <div id="total-votes">Total votes: <span id="total-count">0</span></div>
</div>

<div id="tab-bar">
  <button class="tab active" data-tour="na">&#x1F30E; North America &middot; 2026</button>
  <button class="tab"        data-tour="eu">&#x1F30D; Europe &middot; 2027</button>
</div>

<div id="main">
  <!-- North America 2026 -->
  <div class="tour-pane" id="pane-na">
    <div class="sidebar">
      <div class="sidebar-header">&#x1F525; Concerts by Votes</div>
      <div id="list-na"></div>
    </div>
    <div class="map-container" id="map-na"></div>
  </div>

  <!-- Europe 2027 (hidden until first tab click; Leaflet init deferred to avoid zero-size canvas error) -->
  <div class="tour-pane" id="pane-eu" style="display:none">
    <div class="sidebar">
      <div class="sidebar-header">&#x1F525; Concerts by Votes</div>
      <div id="list-eu"></div>
    </div>
    <div class="map-container" id="map-eu"></div>
  </div>
</div>

<div id="legend">
  <div class="legend-title">Vote Intensity</div>
  <div class="legend-gradient"></div>
  <div class="legend-labels">
    <span>0</span>
    <span id="legend-mid">-</span>
    <span id="legend-max">-</span>
  </div>
</div>

// Seed initial random votes (done here so EU votes accumulate via simulation
// even before the EU Leaflet map is first opened)
CONCERTS_NA.forEach(c => { c.votes = Math.floor(Math.random() * 21); });
CONCERTS_EU.forEach(c => { c.votes = Math.floor(Math.random() * 21); });

// =============================================================================
// Shared constants
// =============================================================================
const HEAT_GRADIENT = {
  0.000: '#0033cc', 0.083: '#0066ee', 0.167: '#0099ff',
  0.250: '#00bbee', 0.333: '#00ccaa', 0.417: '#00cc77',
  0.500: '#00bb44', 0.583: '#66cc00', 0.667: '#aadd00',
  0.750: '#ffcc00', 0.833: '#ff8800', 1.000: '#ff2200'
};

function voteColor(ratio) {
  if (ratio <= 0)       return '#444';
  if (ratio <  1/12)    return '#0033cc';
  if (ratio <  2/12)    return '#0066ee';
  if (ratio <  3/12)    return '#0099ff';
  if (ratio <  4/12)    return '#00bbee';
  if (ratio <  5/12)    return '#00ccaa';
  if (ratio <  6/12)    return '#00cc77';
  if (ratio <  7/12)    return '#00bb44';
  if (ratio <  8/12)    return '#66cc00';
  if (ratio <  9/12)    return '#aadd00';
  if (ratio < 10/12)    return '#ffcc00';
  if (ratio < 11/12)    return '#ff8800';
  return '#ff2200';
}

function markerRadius(ratio) { return 3 + Math.round(ratio * 19); }

// =============================================================================
// Tour factory
// NOTE: call only when the map container is already visible in the DOM so
// leaflet.heat gets a non-zero canvas size on first render.
// =============================================================================
function initTour({ concerts, mapId, listId, center, zoom }) {
  function getMax() { return Math.max(1, ...concerts.map(c => c.votes)); }

  const map = L.map(mapId).setView(center, zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  let heatLayer = null;
  const markers = {};

  function popupHtml(c) {
    return `
      <div class="popup-date">${c.date} &bull; ${c.state}</div>
      <div class="popup-venue">${c.venue}</div>
      <div class="popup-city">${c.city}, ${c.state}</div>
      <div class="popup-votes">&#x1F525; ${c.votes} vote${c.votes !== 1 ? 's' : ''}</div>
    `;
  }

  concerts.forEach(c => {
    const m = L.circleMarker([c.lat, c.lng], {
      radius: markerRadius(0),
      color: '#6a0000',
      fillColor: '#cc2200',
      fillOpacity: 0.55,
      weight: 1
    }).addTo(map);
    m.bindPopup('', { maxWidth: 230 });
    m.on('click', () => { m.setPopupContent(popupHtml(c)); m.openPopup(); });
    markers[c.id] = m;
  });

  function refreshHeat() {
    const max = getMax();
    if (heatLayer) map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(
      concerts.map(c => [c.lat, c.lng, c.votes / max]),
      { radius: 55, blur: 40, maxZoom: 10, max: 1.0, gradient: HEAT_GRADIENT }
    ).addTo(map);
  }

  function refreshMarkers() {
    const max = getMax();
    concerts.forEach(c => { markers[c.id].setRadius(markerRadius(c.votes / max)); });
  }

  function refreshSidebar() {
    const max    = getMax();
    const sorted = [...concerts].sort((a, b) => b.votes - a.votes);
    const total  = concerts.reduce((s, c) => s + c.votes, 0);
    const list   = document.getElementById(listId);
    list.innerHTML = '';
    sorted.forEach((c, i) => {
      const ratio = c.votes / max;
      const color = voteColor(ratio);
      const cls   = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const div   = document.createElement('div');
      div.className = 'concert-item ' + cls;
      div.innerHTML = `
        <div class="vote-bar-wrap">
          <div class="concert-name">${c.venue}</div>
          <div class="concert-date">${c.date} &middot; ${c.city}, ${c.state}</div>
          <div class="vote-bar"><div class="vote-bar-fill" style="width:${Math.round(ratio*100)}%;background:${color}"></div></div>
        </div>
        <div class="vote-count" style="color:${color}">${c.votes}</div>
      `;
      div.addEventListener('click', () => {
        map.setView([c.lat, c.lng], 8, { animate: true });
        markers[c.id].setPopupContent(popupHtml(c));
        markers[c.id].openPopup();
      });
      list.appendChild(div);
    });
    return total;
  }

  function refreshLegend() {
    const max = getMax();
    document.getElementById('legend-mid').textContent = Math.round(max / 2);
    document.getElementById('legend-max').textContent = max;
  }

  function refresh() {
    refreshHeat();
    refreshMarkers();
    return refreshSidebar();
  }

  refresh(); // initial render

  return {
    map,
    concerts,
    refreshLegend,
    updateVotes(array) {
      array.forEach(({ id, votes }) => {
        const c = concerts.find(x => x.id === id);
        if (!c) return;
        c.votes = votes;
        if (markers[id]) markers[id].setPopupContent(popupHtml(c));
      });
      return refresh();
    }
  };
}

// =============================================================================
// Initialize tours
// NA is created immediately (its pane is visible on load).
// EU is created lazily the first time the user clicks that tab, so that
// leaflet.heat always gets a canvas with real dimensions.
// =============================================================================
const tours = {
  na: initTour({ concerts: CONCERTS_NA, mapId: 'map-na', listId: 'list-na', center: [39.5, -98.35], zoom: 4 }),
  eu: null
};

tours.na.refreshLegend();
document.getElementById('total-count').textContent =
  CONCERTS_NA.reduce((s, c) => s + c.votes, 0).toLocaleString();

// =============================================================================
// Tab switching
// =============================================================================
let activeTour = 'na';

const TOUR_META = {
  na: '20th Anniversary World Tour &middot; North America &middot; 45 shows',
  eu: '20th Anniversary World Tour &middot; Europe &middot; 21 shows'
};

function switchTab(tourId) {
  if (tourId === activeTour) return;
  activeTour = tourId;

  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tour === tourId));

  // Show the target pane before any Leaflet calls so map container has real dimensions
  document.querySelectorAll('.tour-pane').forEach(p => { p.style.display = 'none'; });
  document.getElementById('pane-' + tourId).style.display = 'flex';

  // Lazy-init EU on first visit (pane is visible now, so canvas size is non-zero)
  if (tourId === 'eu' && !tours.eu) {
    tours.eu = initTour({ concerts: CONCERTS_EU, mapId: 'map-eu', listId: 'list-eu', center: [54, 9], zoom: 5 });
  }

  document.getElementById('subtitle').innerHTML = TOUR_META[tourId];

  const tour = tours[tourId];
  tour.map.invalidateSize();
  tour.refreshLegend();
  document.getElementById('total-count').textContent =
    tour.concerts.reduce((s, c) => s + c.votes, 0).toLocaleString();
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tour));
});

// =============================================================================
// PUBLIC API — call this with data from your database
// =============================================================================
// updateVotes([{ id: "c01", votes: 14 }, { id: "e05", votes: 9 }, ...])
function updateVotes(array) {
  const byTour = { na: [], eu: [] };
  array.forEach(item => {
    (item.id.startsWith('e') ? byTour.eu : byTour.na).push(item);
  });

  if (byTour.na.length) {
    const total = tours.na.updateVotes(byTour.na);
    if (activeTour === 'na') {
      tours.na.refreshLegend();
      document.getElementById('total-count').textContent = total.toLocaleString();
    }
  }

  if (byTour.eu.length) {
    if (tours.eu) {
      // EU map is live — update normally
      const total = tours.eu.updateVotes(byTour.eu);
      if (activeTour === 'eu') {
        tours.eu.refreshLegend();
        document.getElementById('total-count').textContent = total.toLocaleString();
      }
    } else {
      // EU map not yet created — update raw data so it's ready when tab opens
      byTour.eu.forEach(({ id, votes }) => {
        const c = CONCERTS_EU.find(x => x.id === id);
        if (c) c.votes = votes;
      });
    }
  }
}

// =============================================================================
// Simulated real-time updates — replace with your polling / WebSocket logic
// Example: setInterval(() => fetch('/api/votes').then(r=>r.json()).then(updateVotes), 5000);
// =============================================================================
function simulateUpdate() {
  const count = 1 + Math.floor(Math.random() * 3);
  const updates = [];
  for (let i = 0; i < count; i++) {
    const c = CONCERTS_NA[Math.floor(Math.random() * CONCERTS_NA.length)];
    updates.push({ id: c.id, votes: c.votes + 1 });
  }
  for (let i = 0; i < count; i++) {
    const c = CONCERTS_EU[Math.floor(Math.random() * CONCERTS_EU.length)];
    updates.push({ id: c.id, votes: c.votes + 1 });
  }
  updateVotes(updates);
}

setInterval(simulateUpdate, 1500);
</script>
